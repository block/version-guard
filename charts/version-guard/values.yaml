replicaCount: 1

image:
  repository: ghcr.io/block/version-guard
  tag: ""
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Additional pod annotations (e.g. for service mesh sidecar configuration)
podAnnotations: {}

containerPort: 8080

service:
  type: ClusterIP
  port: 8080

env: []

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi
