replicaCount: 1

image:
  repository: ghcr.io/block/version-guard
  tag: ""
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}

# Additional pod annotations (e.g. for service mesh sidecar configuration)
podAnnotations: {}

containerPort: 8080
adminPort: 8081

service:
  type: ClusterIP
  port: 8080
  adminPort: 8081

env: []

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

# Additional volume mounts for the main container
volumeMounts: []

# Additional volumes for the pod
volumes: []

# Additional sidecar containers (e.g., EOL override proxy)
# Example: nginx sidecar serving patched endoflife.date JSON for products
# with pending upstream PRs (aurora-mysql, opensearch 3.3/3.5):
#
# extraContainers:
#   - name: eol-override
#     image: nginxinc/nginx-unprivileged:alpine
#     ports:
#       - containerPort: 8082
#     volumeMounts:
#       - name: eol-config
#         mountPath: /etc/nginx/conf.d/default.conf
#         subPath: nginx.conf
#         readOnly: true
#       - name: eol-data
#         mountPath: /data/api
#         readOnly: true
#     resources:
#       requests:
#         cpu: 10m
#         memory: 16Mi
#       limits:
#         memory: 32Mi
#
# volumes:
#   - name: eol-config
#     configMap:
#       name: eol-override
#       items:
#         - key: nginx.conf
#           path: nginx.conf
#   - name: eol-data
#     configMap:
#       name: eol-override
#       items:
#         - key: amazon-aurora-mysql.json
#           path: amazon-aurora-mysql.json
#         - key: amazon-opensearch.json
#           path: amazon-opensearch.json
#
# Then set EOL_BASE_URL=http://127.0.0.1:8082/api in env to use the sidecar.
# Note: use 127.0.0.1 (not localhost) to avoid IPv6 resolution issues.
extraContainers: []
