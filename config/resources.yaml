  # 1. Add resource definitions below
  # 2. Set WIZ_REPORT_IDS environment variable with JSON map of resource ID to report ID
  #    Example: WIZ_REPORT_IDS='{"aurora-postgresql":"report-123","eks":"report-456"}'
  #
  # Example: Aurora PostgreSQL (Standard Schema)
